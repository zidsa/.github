name: Kiro Code Review (Reusable)

on:
  workflow_call:
    secrets:
      KIRO_AUTH_TOKEN:
        required: true

jobs:
  kiro-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: React with 👀
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Post acknowledgement
        uses: actions/github-script@v7
        id: ack
        with:
          script: |
            const { data } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🤖 **Kiro** is reviewing the diff, hang tight...'
            });
            return data.id;

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Restore Kiro auth
        run: |
          mkdir -p ~/.aws/sso/cache
          echo '${{ secrets.KIRO_AUTH_TOKEN }}' > ~/.aws/sso/cache/kiro-auth-token.json

      - name: Get diff
        run: |
          DEFAULT_BRANCH=$(git remote show origin | awk '/HEAD branch/ {print $NF}')
          git fetch origin "$DEFAULT_BRANCH"
          git diff "origin/${DEFAULT_BRANCH}...HEAD" > /tmp/pr.diff

      - name: Build prompt
        run: |
          cat > /tmp/prompt.txt << 'PROMPT_EOF'
          Review the following pull request diff. Provide a thorough code review covering: correctness, potential bugs, security issues, performance, and code quality. Be specific with file names and line references where relevant.

          <diff>
          PROMPT_EOF
          cat /tmp/pr.diff >> /tmp/prompt.txt
          echo "</diff>" >> /tmp/prompt.txt

      - name: Run Kiro review
        id: review
        run: |
          REVIEW=$(kiro-cli chat --no-interactive --trust-tools= "$(cat /tmp/prompt.txt)")
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post review
        uses: actions/github-script@v7
        with:
          script: |
            const ackId = ${{ steps.ack.outputs.result }};
            const review = `${{ steps.review.outputs.result }}`;

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ackId,
              body: `🤖 **Kiro Review**\n\n${review}`
            });
